<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Roblox Obby - Advanced Bank System</title>
    <style>
        :root { --gold: #ffd700; --robux: #00e5ff; --secret: #bf40bf; --bank: #1abc9c; --bg: rgba(0, 0, 0, 0.9); }
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: 'Segoe UI', sans-serif; user-select: none; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        #stats-bar { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 5px; pointer-events: none; }
        .stat-card { background: var(--bg); padding: 8px 15px; border-radius: 12px; border: 2px solid white; color: white; font-weight: bold; min-width: 100px; display: flex; justify-content: space-between; pointer-events: auto; font-size: 14px; }
        #level-indicator { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #fff; padding: 8px 15px; border-radius: 15px; border: 2px solid var(--robux); font-weight: bold; font-size: 14px; pointer-events: auto; }
        
        #side-nav { position: absolute; left: 10px; top: 70px; display: flex; flex-direction: column; gap: 8px; pointer-events: auto; }
        .nav-item { width: 65px; height: 65px; background: var(--bg); border: 2px solid #fff; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; cursor: pointer; transition: 0.1s; }
        .nav-item span { font-size: 10px; margin-top: 2px; font-weight: bold; text-align: center; line-height: 1.1; }

        /* Modal System */
        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; pointer-events: auto; padding: 20px; box-sizing: border-box; }
        .modal-box { background: #fff; width: 100%; max-width: 420px; max-height: 85vh; border-radius: 20px; padding: 20px; color: #333; position: relative; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-shrink: 0; }
        .close-btn { font-size: 28px; cursor: pointer; color: #999; padding: 0 10px; }
        
        .modal-content { flex-grow: 1; overflow-y: auto; padding-right: 10px; }
        .modal-content::-webkit-scrollbar { width: 6px; }
        .modal-content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        /* Bank Styles */
        .bank-option { background: #f0f0f0; border: 2px solid #ddd; border-radius: 12px; padding: 15px; margin-bottom: 10px; cursor: pointer; text-align: center; transition: 0.2s; }
        .bank-option:active { transform: scale(0.98); }
        .bank-option.active { border-color: var(--bank); background: #e8f8f5; }
        .exchange-input-area { margin-top: 15px; display: none; flex-direction: column; gap: 10px; }
        .exchange-input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }

        .item-list { display: flex; flex-direction: column; gap: 8px; }
        .shop-item { background: #f8f9fa; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .item-info { flex: 1; padding-right: 10px; }
        .item-info b { font-size: 14px; display: block; }
        .item-info small { color: #666; font-size: 11px; }
        .buy-btn { border: none; padding: 8px 10px; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; min-width: 65px; font-size: 12px; flex-shrink: 0; }

        .inj-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }

        /* Admin Warp Button Grid */
        .warp-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .warp-btn { background: var(--secret); color: white; border: none; border-radius: 10px; padding: 10px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .warp-btn:active { transform: scale(0.95); }

        /* Mobile Controls */
        #joy-base { 
            position: absolute; bottom: 30px; left: 30px; width: 100px; height: 100px; 
            background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); 
            pointer-events: auto; display: none; 
        }
        #joy-knob { position: absolute; width: 50px; height: 50px; background: #fff; border-radius: 50%; left: 25px; top: 25px; }
        #jump-btn { 
            position: absolute; bottom: 30px; right: 30px; width: 85px; height: 85px; 
            background: rgba(255,255,255,0.2); border: 4px solid #fff; border-radius: 50%; 
            display: none; align-items: center; justify-content: center; color: #fff; 
            font-weight: bold; pointer-events: auto; font-size: 18px; 
        }

        @media (pointer: coarse) {
            #joy-base { display: block; }
            #jump-btn { display: flex; }
        }

        #toast { position: absolute; top: 15%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: #fff; padding: 12px 25px; border-radius: 50px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 5000; font-weight: bold; border: 2px solid #fff; text-align: center; font-size: 14px; }
        
        #camera-touch-area { position: absolute; inset: 0; pointer-events: auto; z-index: 50; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="camera-touch-area"></div>

    <div id="ui-layer">
        <div id="level-indicator">Level: <span id="cur-lvl">1</span> / 8</div>
        <div id="stats-bar">
            <div class="stat-card" style="border-color:var(--gold);">💰 <span id="val-gold">0</span></div>
            <div class="stat-card" style="border-color:var(--robux);">💎 <span id="val-robux">0</span></div>
        </div>
        <div id="side-nav">
            <div class="nav-item" style="border-color:var(--gold); color:var(--gold);" onclick="openShop('gold')">🛒<span>Gold<br>Shop</span></div>
            <div class="nav-item" style="border-color:var(--robux); color:var(--robux);" onclick="openShop('robux')">👑<span>R$<br>Shop</span></div>
            <div class="nav-item" style="border-color:var(--bank); color:var(--bank);" onclick="openBank()">🏦<span>Bank<br>Exchange</span></div>
            <div class="nav-item" style="border-color:var(--secret); color:var(--secret);" onclick="openModal('secret-modal')">⚡<span>Admin<br>Panel</span></div>
        </div>
        <div id="joy-base"><div id="joy-knob"></div></div>
        <div id="jump-btn">JUMP</div>
        <div id="toast">Alert</div>
    </div>

    <!-- Bank Modal -->
    <div id="bank-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header"><h2>🏦 Bank System</h2><span class="close-btn" onclick="closeModals()">×</span></div>
            <div class="modal-content">
                <p style="text-align:center; margin-bottom:15px; color:#666;">Rate: 5 Gold ↔ 1 R$</p>
                
                <div id="opt-g2r" class="bank-option" onclick="selectBankMode('G2R')">
                    <b>💰 Gold ➔ 💎 R$</b><br><small>Cost 5 Gold for 1 R$</small>
                </div>
                
                <div id="opt-r2g" class="bank-option" onclick="selectBankMode('R2G')">
                    <b>💎 R$ ➔ 💰 Gold</b><br><small>Cost 1 R$ for 5 Gold</small>
                </div>

                <div id="exchange-ui" class="exchange-input-area">
                    <label id="exchange-label" style="font-weight:bold;"></label>
                    <input type="number" id="exchange-amount" class="exchange-input" placeholder="Enter amount" min="1">
                    <button class="buy-btn" style="width:100%; padding:15px; background:var(--bank); font-size:18px;" onclick="confirmExchange()">Confirm Exchange</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div id="secret-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header"><h2>⚡ Admin Panel</h2><span class="close-btn" onclick="closeModals()">×</span></div>
            <div class="modal-content">
                <p style="font-weight:bold; font-size:14px; margin:0 0 10px 0;">Resource Injection</p>
                <input type="number" id="inj-amt" class="inj-input" placeholder="Amount to inject">
                <input type="password" id="inj-code" class="inj-input" placeholder="Enter admin code">
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button style="flex:1; padding:15px; background:var(--gold); color:white; border:none; border-radius:10px; font-weight:bold;" onclick="doInject('gold')">Inject Gold</button>
                    <button style="flex:1; padding:15px; background:var(--robux); color:white; border:none; border-radius:10px; font-weight:bold;" onclick="doInject('robux')">Inject R$</button>
                </div>

                <hr style="border:0; border-top:1px solid #eee; margin-bottom:15px;">
                <p style="font-weight:bold; font-size:14px; margin:0 0 10px 0;">🚩 Level Teleport (Requires Code)</p>
                <div class="warp-grid">
                    <button class="warp-btn" onclick="warpToLevel(1)">Lv.1</button>
                    <button class="warp-btn" onclick="warpToLevel(2)">Lv.2</button>
                    <button class="warp-btn" onclick="warpToLevel(3)">Lv.3</button>
                    <button class="warp-btn" onclick="warpToLevel(4)">Lv.4</button>
                    <button class="warp-btn" onclick="warpToLevel(5)">Lv.5</button>
                    <button class="warp-btn" onclick="warpToLevel(6)">Lv.6</button>
                    <button class="warp-btn" onclick="warpToLevel(7)">Lv.7</button>
                    <button class="warp-btn" onclick="warpToLevel(8)">Lv.8</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Shop Modal -->
    <div id="shop-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header"><h2 id="shop-title">Shop</h2><span class="close-btn" onclick="closeModals()">×</span></div>
            <div class="modal-content">
                <div id="shop-items-container" class="item-list"></div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, player;
        let platforms = [], coins = [], lasers = [];
        let wallet = 0, robux = 0, currentLevel = 1, paused = false;
        let vY = 0, onGround = false, joyX = 0, joyZ = 0;
        let speedM = 1, jumpM = 1, gravityM = 1;
        let itemCounts = {}; 
        
        let camPhi = Math.PI / 4; 
        let camTheta = 0;        
        let touchStartPos = { x: 0, y: 0 };
        const SECRET_CODE = "9981";

        let keys = { w: false, a: false, s: false, d: false };
        let bankMode = ""; 

        function updateUI() {
            document.getElementById('val-gold').innerText = Math.floor(wallet);
            document.getElementById('val-robux').innerText = Math.floor(robux);
            document.getElementById('cur-lvl').innerText = currentLevel;
        }

        function notify(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        function openModal(id) { paused = true; document.getElementById(id).style.display = 'flex'; }
        
        function closeModals() { 
            document.querySelectorAll('.modal-overlay').forEach(m=>m.style.display='none'); 
            paused = false; 
            bankMode = "";
            document.getElementById('exchange-ui').style.display = 'none';
            document.querySelectorAll('.bank-option').forEach(o => o.classList.remove('active'));
        }

        function openBank() {
            openModal('bank-modal');
        }

        function selectBankMode(mode) {
            bankMode = mode;
            document.querySelectorAll('.bank-option').forEach(o => o.classList.remove('active'));
            document.getElementById(mode === 'G2R' ? 'opt-g2r' : 'opt-r2g').classList.add('active');
            
            const ui = document.getElementById('exchange-ui');
            const label = document.getElementById('exchange-label');
            const input = document.getElementById('exchange-amount');
            
            ui.style.display = 'flex';
            input.value = "";
            label.innerText = mode === 'G2R' ? "Gold to exchange:" : "R$ to exchange:";
        }

        function confirmExchange() {
            const amount = parseInt(document.getElementById('exchange-amount').value);
            if (!amount || amount <= 0) {
                notify("⚠️ Please enter a valid amount");
                return;
            }

            if (bankMode === 'G2R') {
                if (wallet >= amount) {
                    const robuxGained = Math.floor(amount / 5);
                    if (robuxGained < 1) {
                        notify("⚠️ Need at least 5 Gold for 1 R$");
                        return;
                    }
                    const cost = robuxGained * 5;
                    wallet -= cost;
                    robux += robuxGained;
                    updateUI();
                    notify(`✅ Exchanged ${cost} Gold for ${robuxGained} R$`);
                    closeModals();
                } else {
                    notify("❌ Insufficient Gold");
                }
            } else if (bankMode === 'R2G') {
                if (robux >= amount) {
                    robux -= amount;
                    wallet += (amount * 5);
                    updateUI();
                    notify(`✅ Exchanged ${amount} R$ for ${amount * 5} Gold`);
                    closeModals();
                } else {
                    notify("❌ Insufficient R$");
                }
            }
        }

        function doInject(t) {
            const a = parseInt(document.getElementById('inj-amt').value) || 0;
            const enteredCode = document.getElementById('inj-code').value;
            if(enteredCode === SECRET_CODE) {
                if(t==='gold') wallet += a; else robux += a;
                updateUI(); notify("⚡ Resources injected");
                document.getElementById('inj-amt').value = "";
            } else { notify("❌ Incorrect code"); }
        }

        function warpToLevel(lvl) {
            const enteredCode = document.getElementById('inj-code').value;
            if(enteredCode === SECRET_CODE) {
                currentLevel = lvl;
                buildMap();
                updateUI();
                notify(`⚡ Teleported to Level ${lvl}`);
                closeModals();
            } else {
                notify("❌ Incorrect code (Enter in Admin Panel)");
            }
        }

        function openShop(type) {
            const cont = document.getElementById('shop-items-container');
            const title = document.getElementById('shop-title');
            cont.innerHTML = "";
            let items = [];

            let statsHtml = `
                <div style="background:#eef2f5; padding:10px; border-radius:10px; margin-bottom:15px; font-size:12px; color:#333; text-align:center; line-height:1.5;">
                    <b>📊 Current Stats</b><br>
                    Speed: ${(speedM * 100).toFixed(0)}% / 500% | Jump: ${(jumpM * 100).toFixed(0)}% | Gravity: ${(gravityM * 100).toFixed(0)}%<br>
                    Coin Bonus: +${window.coinBonus || 0} | Coin Mult: x${window.coinMult || 1} | Magnet: ${window.magnetRange || 0}
                </div>
            `;
            cont.innerHTML = statsHtml;
            
            if(type === 'gold') {
                title.innerText = "🛒 Gold Shop (10 Items)";
                items = [
                    {n:"Wooden Shoes", d:"Speed +7%", p:50, max: 20, isSpeed: true, f:()=>speedM+=0.07},
                    {n:"Bronze Spring", d:"Jump +15%", p:100, max: 20, f:()=>jumpM+=0.15},
                    {n:"Starter Backpack", d:"+2 Coins per grab", p:200, max: 20, f:()=>{window.coinBonus=(window.coinBonus||0)+2}},
                    {n:"Silver Motor", d:"Speed +50%", p:350, max: 20, isSpeed: true, f:()=>speedM+=0.5},
                    {n:"Feather Potion", d:"Gravity -20%", p:500, max: 20, f:()=>gravityM*=0.8},
                    {n:"Golden Boots", d:"Speed +100%", p:750, max: 20, isSpeed: true, f:()=>speedM+=1.0},
                    {n:"Giant Potion", d:"Size x1.5", p:1000, max: 20, f:()=>{player.scale.multiplyScalar(1.5)}},
                    {n:"Magnet Shards", d:"Auto-collect nearby coins", p:1500, max: 20, f:()=>{window.magnetRange=(window.magnetRange||0)+10}},
                    {n:"Neutron Gravity", d:"Fall faster", p:2000, max: 20, f:()=>gravityM*=1.3},
                    {n:"Finance Expert", d:"Get 1 R$ directly", p:5000, f:()=>{robux+=1; updateUI();}}
                ];
            } else {
                title.innerText = "👑 R$ Premium Shop (10 Items)";
                items = [
                    {n:"R$ Agility", d:"All Stats +30%", p:100, max: 20, isSpeed: true, f:()=>{speedM+=0.3; jumpM+=0.3}},
                    {n:"R$ Lucky Star", d:"Coin gain x2", p:250, max: 20, f:()=>{window.coinMult=(window.coinMult||1)*2}},
                    {n:"R$ Lightning", d:"Speed +150%", p:600, max: 20, isSpeed: true, f:()=>speedM+=1.5},
                    {n:"R$ Ghost Cloak", d:"Invincible to lasers", p:1000, max: 1, f:()=>{window.invincible=true}},
                    {n:"R$ Magnetic Storm", d:"Global auto-collect", p:1500, max: 1, f:()=>{window.magnetRange=1000}},
                    {n:"R$ Portal", d:"Instant next level", p:2000, f:()=>{handleWin()}},
                    {n:"R$ Flight", d:"Gravity drops to 0.1", p:2500, max: 1, f:()=>gravityM=0.1},
                    {n:"R$ Rainbow Trail", d:"Neon glow effect", p:3000, max: 1, f:()=>{player.traverse(o=>{if(o.isMesh)o.material.emissive=new THREE.Color(0x00ffff)})}},
                    {n:"R$ Ninja", d:"Infinite multi-jump", p:3500, max: 1, f:()=>{window.multiJump=true}},
                    {n:"R$ Admin Mode", d:"God mode enabled", p:5000, max: 1, f:()=>{speedM=6;jumpM=2.5;window.invincible=true;currentLevel=8;buildMap();}}
                ];
            }

            const SPEED_LIMIT = 5.0; 

            items.forEach(it => {
                const row = document.createElement('div'); row.className = "shop-item";
                const count = itemCounts[it.n] || 0;
                const max = it.max || Infinity;
                
                let isMaxed = count >= max;
                if (it.isSpeed && speedM >= SPEED_LIMIT) isMaxed = true;
                
                const btnText = isMaxed ? 'MAX' : it.p;
                const btnStyle = isMaxed ? 'background:#95a5a6; cursor:not-allowed;' : `background:${type==='gold'?'#f1c40f':'#3498db'}`;
                const onClickAction = isMaxed ? '' : `onclick="processBuy('${type}',${it.p},${it.f.toString()}, '${it.n}', ${max})"`;

                row.innerHTML = `<div class="item-info"><b>${it.n} <span style="color:#e74c3c; font-size:11px;">(Lv.${count}${max !== Infinity ? '/' + max : ''})</span></b><small>${it.d}</small></div>
                <button class="buy-btn" style="${btnStyle}" ${onClickAction}>${btnText}</button>`;
                cont.appendChild(row);
            });
            openModal('shop-modal');
        }

        window.processBuy = (t, p, f, itemName, maxCount) => {
            const currentCount = itemCounts[itemName] || 0;
            const speedItems = ["Wooden Shoes", "Silver Motor", "Golden Boots", "R$ Lightning", "R$ Agility"];
            if (speedItems.includes(itemName) && speedM >= 5.0) {
                notify("⚠️ Speed limit reached (500%)");
                return;
            }

            if (currentCount >= maxCount) {
                notify("⚠️ Max limit reached");
                return;
            }

            if((t==='gold'?wallet:robux) >= p) {
                if(t==='gold') wallet -= p; else robux -= p;
                (new Function('return '+f)())(); 
                itemCounts[itemName] = currentCount + 1;
                updateUI(); 
                notify("✅ Purchase successful");
                openShop(t);
            } else { notify("❌ Insufficient balance"); }
        };

        const LEVEL_STYLES = [
            { name: "Starter Dash", color: 0x4caf50, gap: 14, size: 14, laserChance: 0.1 },
            { name: "Forest Path", color: 0x8bc34a, gap: 16, size: 12, laserChance: 0.2 },
            { name: "Rock Jump", color: 0x795548, gap: 18, size: 10, laserChance: 0.3 },
            { name: "Neon Grid", color: 0x2196f3, gap: 20, size: 9,  laserChance: 0.5 },
            { name: "Sea of Fire", color: 0xf44336, gap: 22, size: 8,  laserChance: 0.7 },
            { name: "Amethyst Maze", color: 0x9c27b0, gap: 24, size: 7,  laserChance: 0.8 },
            { name: "Deep Sea Despair", color: 0x001f3f, gap: 26, size: 6,  laserChance: 0.9 },
            { name: "Final Judgment", color: 0x000000, gap: 28, size: 4.5, laserChance: 1.0 }
        ];

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x0a0a0a);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const light = new THREE.DirectionalLight(0xffffff, 0.8); light.position.set(10,50,10); scene.add(light);

            player = new THREE.Group();
            const skin = new THREE.MeshLambertMaterial({color: 0xFFDB00});
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshLambertMaterial({color: 0x005BB2}));
            body.position.y = 0.6; player.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), skin);
            head.position.y = 1.5; player.add(head);
            const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), skin); lArm.position.set(-0.6, 0.8, 0); player.add(lArm);
            const rArm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), skin); rArm.position.set(0.6, 0.8, 0); player.add(rArm);
            scene.add(player);

            buildMap(); setupIO(); loop();
        }

        function buildMap() {
            platforms.forEach(p => scene.remove(p.mesh)); platforms = [];
            coins.forEach(c => scene.remove(c.mesh)); coins = [];
            lasers.forEach(l => scene.remove(l.mesh)); lasers = [];

            const style = LEVEL_STYLES[currentLevel - 1];
            notify(`Level ${currentLevel}: ${style.name}`);

            const add = (x, y, z, w, d, c, t) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 40, d), new THREE.MeshLambertMaterial({color: c, flatShading: true}));
                mesh.position.set(x, y - 20, z); scene.add(mesh);
                platforms.push({ mesh, type: t, top: y, w, d, baseY: y });
            };

            add(0, 0, 0, 18, 18, 0x333333, 'start');
            let levelLength = 12 + currentLevel * 4;
            let currentZ = 0;
            let currentX = 0;

            for(let i=1; i<=levelLength; i++) {
                currentZ -= style.gap;
                if(currentLevel <= 3) currentX = Math.sin(i * 0.5) * 6;
                else if(currentLevel <= 6) currentX = (i % 2 === 0 ? 8 : -8);
                else currentX = (Math.random() - 0.5) * 20;

                let yOffset = Math.sin(i * 0.8) * (currentLevel > 4 ? 3 : 1);
                add(currentX, yOffset, currentZ, style.size, style.size, style.color, 'p');

                const cm = new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.6,0.1,16), new THREE.MeshPhongMaterial({color:0xffd700}));
                cm.position.set(currentX, yOffset + 1.2, currentZ);
                cm.rotation.x = Math.PI/2;
                scene.add(cm); coins.push({mesh:cm});

                if(Math.random() < style.laserChance) {
                    const lm = new THREE.Mesh(new THREE.BoxGeometry(style.size + 1, 0.4, 0.4), new THREE.MeshBasicMaterial({color:0xff0000}));
                    lm.position.set(currentX, yOffset + 1.8, currentZ);
                    let rotSpeed = (currentLevel > 5) ? 0.05 : 0;
                    scene.add(lm); lasers.push({mesh:lm, rotSpeed});
                }
            }

            currentZ -= style.gap;
            add(currentX, 0, currentZ, 30, 30, 0xFFD700, 'end');
            player.position.set(0, 5, 0); vY = 0; updateUI();
        }

        function setupIO() {
            const b = document.getElementById('joy-base'), k = document.getElementById('joy-knob');
            b.ontouchmove = (e) => {
                let r = b.getBoundingClientRect();
                let x = e.touches[0].clientX - (r.left + 50), y = e.touches[0].clientY - (r.top + 50);
                let d = Math.sqrt(x*x+y*y); if(d>40) { x*=40/d; y*=40/d; }
                k.style.transform = `translate(${x}px, ${y}px)`; joyX = x/40; joyZ = y/40;
            };
            b.ontouchend = () => { k.style.transform = ''; joyX = 0; joyZ = 0; };
            
            const jumpBtn = document.getElementById('jump-btn');
            jumpBtn.ontouchstart = (e) => { 
                e.preventDefault();
                if((onGround || window.multiJump) && !paused) vY = 0.43 * jumpM; 
            };
            jumpBtn.onmousedown = (e) => { 
                if((onGround || window.multiJump) && !paused) vY = 0.43 * jumpM; 
            };

            const touchArea = document.getElementById('camera-touch-area');
            touchArea.ontouchstart = (e) => { touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY }; };
            touchArea.ontouchmove = (e) => {
                let dx = e.touches[0].clientX - touchStartPos.x;
                let dy = e.touches[0].clientY - touchStartPos.y;
                camTheta -= dx * 0.007;
                camPhi = Math.max(0.1, Math.min(Math.PI / 2.1, camPhi + dy * 0.007));
                touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            };
            
            let isDragging = false;
            touchArea.onmousedown = (e) => { isDragging = true; touchStartPos = { x: e.clientX, y: e.clientY }; };
            window.onmouseup = () => { isDragging = false; };
            window.onmousemove = (e) => {
                if(!isDragging) return;
                let dx = e.clientX - touchStartPos.x;
                let dy = e.clientY - touchStartPos.y;
                camTheta -= dx * 0.007;
                camPhi = Math.max(0.1, Math.min(Math.PI / 2.1, camPhi + dy * 0.007));
                touchStartPos = { x: e.clientX, y: e.clientY };
            };

            window.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (keys.hasOwnProperty(key)) {
                    keys[key] = true;
                }
                if (e.code === 'Space' && (onGround || window.multiJump) && !paused) {
                    vY = 0.43 * jumpM;
                    e.preventDefault(); 
                }
            });

            window.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                if (keys.hasOwnProperty(key)) {
                    keys[key] = false;
                }
            });
        }

        function handleWin() {
            if (currentLevel < 8) {
                currentLevel++; notify(`🏁 Proceeding to Level ${currentLevel}`); buildMap();
            } else {
                wallet += 1000; currentLevel = 1; updateUI(); notify("🏆 All Levels Cleared! Reward $1000!"); buildMap();
            }
        }

        function loop() {
            requestAnimationFrame(loop);
            if(paused) { renderer.render(scene, camera); return; }

            let kX = (keys.d ? 1 : 0) - (keys.a ? 1 : 0);
            let kZ = (keys.s ? 1 : 0) - (keys.w ? 1 : 0);
            let useX = joyX !== 0 ? joyX : kX;
            let useZ = joyZ !== 0 ? joyZ : kZ;

            if (useX !== 0 && useZ !== 0 && joyX === 0 && joyZ === 0) {
                let mag = Math.sqrt(useX*useX + useZ*useZ);
                useX /= mag;
                useZ /= mag;
            }

            let forward = new THREE.Vector3(Math.sin(camTheta), 0, Math.cos(camTheta)).normalize();
            let right = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), forward).normalize();
            
            let moveX = (useX * right.x + useZ * forward.x) * 0.35 * speedM;
            let moveZ = (useX * right.z + useZ * forward.z) * 0.35 * speedM;
            
            player.position.x += moveX;
            player.position.z += moveZ;
            vY -= 0.022 * gravityM; player.position.y += vY;

            if (Math.abs(useX) > 0.1 || Math.abs(useZ) > 0.1) player.rotation.y = Math.atan2(moveX, moveZ);

            onGround = false;
            platforms.forEach(p => {
                let px = player.position.x, pz = player.position.z, mx = p.mesh.position.x, mz = p.mesh.position.z;
                if(Math.abs(px - mx) < (p.w/2 + 0.5) && Math.abs(pz - mz) < (p.d/2 + 0.5)) {
                    if(player.position.y <= p.top + 0.1 && player.position.y > p.top - 2.5) {
                        player.position.y = p.top; vY = 0; onGround = true;
                        if(p.type === 'end') handleWin();
                    }
                }
            });

            if(player.position.y < -20) buildMap();

            const pB = new THREE.Box3().setFromObject(player);
            lasers.forEach(l => {
                if(l.rotSpeed > 0) l.mesh.rotation.y += l.rotSpeed;
                if(!window.invincible && pB.intersectsBox(new THREE.Box3().setFromObject(l.mesh))) buildMap();
            });

            coins.forEach((c,i) => {
                c.mesh.rotation.z += 0.05;
                if(player.position.distanceTo(c.mesh.position) < (window.magnetRange || 0)) c.mesh.position.lerp(player.position, 0.2);
                if(pB.intersectsBox(new THREE.Box3().setFromObject(c.mesh))) { 
                    scene.remove(c.mesh); coins.splice(i,1); 
                    wallet += (10 + (window.coinBonus || 0)) * (window.coinMult || 1); 
                    updateUI(); 
                }
            });

            let camDist = 20;
            camera.position.x = player.position.x + camDist * Math.sin(camTheta) * Math.cos(camPhi);
            camera.position.z = player.position.z + camDist * Math.cos(camTheta) * Math.cos(camPhi);
            camera.position.y = player.position.y + camDist * Math.sin(camPhi);
            camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
            renderer.render(scene, camera);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
